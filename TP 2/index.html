<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Formulaire d'inscription</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <h1>Formulaire d'inscription</h1>

  <form>
    <label for="nom">Nom d'utilisateur</label>
    <input type="text" id="nom" name="nom" placeholder="Votre pseudo">

    <label for="password">Mot de passe</label>
    <input type="password" id="password" name="password" placeholder="••••••••">

    <label for="password2">Confirmation du mot de passe</label>
    <input type="password" id="password2" name="password2" placeholder="••••••••">

    <label for="email">Email</label>
    <input type="email" id="email" name="email" placeholder="votre@email.com">

    <label for="date">Date de naissance</label>
    <input type="date" id="date" name="date">

    <label>Genre</label>
    <div class="radio-group">
      <label><input type="radio" name="genre" value="homme"> Homme</label>
      <label><input type="radio" name="genre" value="femme"> Femme</label>
      <label><input type="radio" name="genre" value="autre"> Autre</label>
    </div>

    <input type="submit" value="S'inscrire">
  </form>

</body>
</html>
